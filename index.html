<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Quản lý sinh viên</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: #f5f7fa;
        }
        .card {
            border-radius: 15px;
        }
        h2 {
            font-weight: bold;
        }
    </style>
</head>
<body>

<div class="container mt-5">

    <!-- Thông tin nhóm -->
    <div class="card p-3 mb-4 shadow">
        <h4>Thông tin nhóm</h4>
        <ul class="mb-0">
            <ul>
                        <li>Trần Văn Thật</li>
                        <li>Trần Thiên Triệu</li>
                        <li>Nguyễn Gia Phát</li>
                        <li>Dương hồng Diểm</li>
            </ul>
        </ul>
    </div>
 <div class="mt-3">
        <a href="api.html" class="btn btn-success">
            Xem mô tả API
        </a>
    </div>
    <!-- Form -->
    <div class="card p-4 mb-4 shadow">
        <h4 class="mb-3">Quản lý sinh viên</h4>

        <div class="row g-3">
            <div class="col-md-3">
                <input id="name" class="form-control" placeholder="Tên sinh viên">
            </div>
            <div class="col-md-2">
                <input id="class_name" class="form-control" placeholder="Lớp">
            </div>
            <div class="col-md-3">
                <input id="email" class="form-control" placeholder="Email">
            </div>
            <div class="col-md-2">
                <input id="mark" type="number" class="form-control" placeholder="Điểm">
            </div>
            <div class="col-md-2 d-grid">
                <button id="btnAdd" class="btn btn-primary" onclick="addStudent()">Thêm</button>
            </div>
        </div>
    </div>

    <!-- Table -->
    <div class="card p-3 shadow">
        <table class="table table-hover text-center align-middle">
            <thead class="table-dark">
                <tr>
                    <th>ID</th>
                    <th>Tên</th>
                    <th>Lớp</th>
                    <th>Email</th>
                    <th>Điểm</th>
                    <th>Hành động</th>
                </tr>
            </thead>
            <tbody id="tableBody"></tbody>
        </table>
    </div>

</div>

<script>
const API = "https://69f85a06dd0c226688ee7835.mockapi.io/student"; // 🔥 THAY API

let editId = null;

// LOAD DATA
async function loadData() {
    const res = await fetch(API);
    const data = await res.json();

    let html = "";
    data.forEach(s => {
        html += `
        <tr>
            <td>${s.id}</td>
            <td>${s.name}</td>
            <td>${s.class_name}</td>
            <td>${s.email}</td>
            <td>${s.mark}</td>
            <td>
                <button class="btn btn-warning btn-sm" onclick="editStudent('${s.id}','${s.name}','${s.class_name}','${s.email}','${s.mark}')">Sửa</button>
                <button class="btn btn-danger btn-sm" onclick="deleteStudent('${s.id}')">Xóa</button>
            </td>
        </tr>`;
    });

    document.getElementById("tableBody").innerHTML = html;
}

// ADD hoặc UPDATE
async function addStudent() {
    const student = {
        name: name.value,
        class_name: class_name.value,
        email: email.value,
        mark: mark.value
    };

    if (editId === null) {
        // ADD
        await fetch(API, {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify(student)
        });
    } else {
        // UPDATE
        await fetch(API + "/" + editId, {
            method: "PUT",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify(student)
        });

        editId = null;
        document.getElementById("btnAdd").innerText = "Thêm";
    }

    clearForm();
    loadData();
}

// DELETE
async function deleteStudent(id) {
    if (confirm("Bạn có chắc muốn xóa?")) {
        await fetch(API + "/" + id, {
            method: "DELETE"
        });
        loadData();
    }
}

// EDIT
function editStudent(id, nameVal, classVal, emailVal, markVal) {
    name.value = nameVal;
    class_name.value = classVal;
    email.value = emailVal;
    mark.value = markVal;

    editId = id;
    document.getElementById("btnAdd").innerText = "Cập nhật";
}

// CLEAR FORM
function clearForm() {
    name.value = "";
    class_name.value = "";
    email.value = "";
    mark.value = "";
}

loadData();
</script>

</body>
</html>
